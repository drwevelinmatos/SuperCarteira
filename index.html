<!DOCTYPE html>
<! Super Carteira Code 6 + Aporte >
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Patrimônio + Simulador de Aporte</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #27ae60; --bg: #f8f9fa; --blue: #3182ce; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; font-size: 13px; }
        .container { max-width: 1600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        /* Cabeçalho e Cards */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .summary-cards { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .card { flex: 1; min-width: 200px; background: var(--primary); color: white; padding: 15px; border-radius: 8px; text-align: center; }
        
        /* Formulário Principal */
        .form-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; background: #edf2f7; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        select, input, button { padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; }
        .btn-add { background: var(--accent); color: white; cursor: pointer; font-weight: bold; border: none; }
        .btn-simular { background: var(--blue); color: white; cursor: pointer; font-weight: bold; border: none; padding: 10px 20px; border-radius: 6px; }

        /* Tabela Principal */
        table { width: 100%; border-collapse: collapse; }
        th { background: #2d3748; color: white; padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #eee; }
        .row-group { background: #1a2a3a; color: white; font-weight: bold; }
        .row-subgroup { background: #cbd5e0; font-weight: bold; }
        .row-strategy { background: #e2e8f0; font-style: italic; }
        .indent-3 { padding-left: 40px; }

        /* Estilos do Modal (Janela Sobreposta) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 600px; border-radius: 12px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; font-weight: bold; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: bold; }
        .aporte-sugerido { color: var(--accent); font-weight: bold; }

        .pos { color: #27ae60; font-weight: bold; }
        .neg { color: #e53e3e; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Gestão de Patrimônio Estratégica</h2>
        <button class="btn-simular" onclick="abrirSimulador()">📊 Simular Rebalanceamento</button>
    </header>

    <div class="summary-cards">
        <div class="card">Patrimônio Total: <strong id="total-geral">R$ 0,00</strong></div>
        <div class="card">Ativos Únicos: <strong id="qtd-ativos">0</strong></div>
    </div>

    <!-- Formulário de Cadastro -->
    <div class="form-box">
        <select id="selG" onchange="popularS()"><option value="">Grupo...</option></select>
        <select id="selS" onchange="popularE()"><option value="">Subgrupo...</option></select>
        <select id="selE"><option value="">Estratégia...</option></select>
        <input type="text" id="nome" placeholder="Ativo">
        <input type="text" id="corr" placeholder="Corretora">
        <input type="text" id="cnpj" placeholder="CNPJ">
        <input type="number" id="valor" placeholder="Valor (R$)">
        <button class="btn-add" onclick="adicionarAtivo()">Salvar Ativo</button>
    </div>

    <table id="tabelaMain">
        <thead>
            <tr>
                <th>Estrutura / Ativo</th>
                <th>Corretora</th>
                <th>CNPJ</th>
                <th>Valor Atual</th>
                <th>% Real (Total)</th>
                <th>% Alvo (Total)</th>
                <th>Valor Alvo</th>
                <th>Ajuste</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<!-- Modal do Simulador -->
<div id="modalSimulador" class="modal">
    <div class="modal-content">
        <span class="close" onclick="fecharSimulador()">&times;</span>
        <h2 style="text-align: center;">Rebalanceamento de Aporte</h2>
        
        <div class="form-group">
            <label>Tipo de Alocação para o Aporte:</label>
            <select id="simTipo" onchange="atualizarSaldosSimulador()">
                <option value="SUPER_CARTEIRA">Super Carteira</option>
                <option value="PREVIDENCIA">Previdência</option>
            </select>
        </div>

        <div class="form-group">
            <label>Valor Disponível para Aportar (R$):</label>
            <input type="number" id="simValorAporte" value="0" oninput="calcularRebalanceamento()">
        </div>

        <div id="simInputsSaldos">
            <!-- Saldos carregados automaticamente da tabela -->
        </div>

        <table style="margin-top: 15px;">
            <thead>
                <tr>
                    <th>Classe</th>
                    <th>Meta</th>
                    <th>Sugestão de Aporte</th>
                </tr>
            </thead>
            <tbody id="simResultadoBody"></tbody>
        </table>
    </div>
</div>

<script>
    const estrutura = {
        "RESERVA": { nome: "RESERVA DE EMERGÊNCIA", pesoG: 0, subs: { "Segurança": { pesoS: 100, ests: { "Fundo Taxa Zero": 50, "Reserva Alternativa": 50 } } } },
        "SUPER_CARTEIRA": { nome: "SUPER CARTEIRA", pesoG: 57, subs: { 
            "Estabilidade": { pesoS: 22.5, ests: { "Baunilha": 70, "Pimentinha": 30 } },
            "Diversificação": { pesoS: 40, ests: { "Viés Macro": 30, "Ex-Tesoureiros": 40, "Viés Global": 20, "Agro": 3, "Infraestrutura": 5, "Pimentinha": 2 } },
            "Valorização": { pesoS: 30, ests: { "Qualidade": 40, "Fora do Radar": 15, "Perfil Global": 12, "Viés Comprado": 30, "Pimentinha": 3 } },
            "Antifragilidade": { pesoS: 7.5, ests: { "Ouro": 33.4, "Dólar": 66.6 } }
        }},
        "PREVIDENCIA": { nome: "PREVIDÊNCIA", pesoG: 40, subs: {
            "Estabilidade": { pesoS: 22.5, ests: { "Baunilha": 70, "Pimentinha": 30 } },
            "Diversificação": { pesoS: 40, ests: { "Viés Macro": 35, "Ex-Tesoureiros": 40, "Viés Global": 22, "Pimentinha": 3 } },
            "Valorização": { pesoS: 30, ests: { "Qualidade": 40, "Fora do Radar": 30, "Perfil Global": 12, "Viés Comprado": 30, "Pimentinha": 3 } },
            "Fundos de Fundos": { pesoS: 7.5, ests: { "Fundos de Fundos": 100 } }
        }},
        "SATELITE": { nome: "SATÉLITE", pesoG: 3, subs: { "Cripto": { pesoS: 100, ests: { "Cripto": 100 } } } }
    };

    let dados = JSON.parse(localStorage.getItem('invest_v6')) || [];

    // --- FUNÇÕES DA TABELA PRINCIPAL ---
    function popularS() {
        const g = document.getElementById('selG').value;
        const s = document.getElementById('selS');
        s.innerHTML = '<option value="">Subgrupo...</option>';
        if(g) Object.keys(estrutura[g].subs).forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`);
    }

    function popularE() {
        const g = document.getElementById('selG').value;
        const s = document.getElementById('selS').value;
        const e = document.getElementById('selE');
        e.innerHTML = '<option value="">Estratégia...</option>';
        if(g && s) Object.keys(estrutura[g].subs[s].ests).forEach(k => e.innerHTML += `<option value="${k}">${k}</option>`);
    }

    function adicionarAtivo() {
        const item = {
            g: document.getElementById('selG').value,
            s: document.getElementById('selS').value,
            e: document.getElementById('selE').value,
            nome: document.getElementById('nome').value.trim(),
            corr: document.getElementById('corr').value,
            cnpj: document.getElementById('cnpj').value.trim(),
            valor: parseFloat(document.getElementById('valor').value) || 0
        };
        if(!item.nome || item.valor <= 0) return alert("Dados inválidos");
        const idx = dados.findIndex(d => d.nome === item.nome && d.e === item.e);
        if(idx > -1) dados[idx].valor += item.valor; else dados.push(item);
        render();
    }

    function render() {
        localStorage.setItem('invest_v6', JSON.stringify(dados));
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';
        const totalGeral = dados.reduce((a, b) => a + b.valor, 0);
        document.getElementById('total-geral').innerText = `R$ ${totalGeral.toLocaleString('pt-BR')}`;
        document.getElementById('qtd-ativos').innerText = dados.length;

        Object.keys(estrutura).forEach(gK => {
            const ativosG = dados.filter(a => a.g === gK);
            if(ativosG.length === 0) return;
            const totalG = ativosG.reduce((a, b) => a + b.valor, 0);
            corpo.innerHTML += `<tr class="row-group"><td>${estrutura[gK].nome}</td><td colspan="2"></td><td>R$ ${totalG.toLocaleString('pt-BR')}</td><td colspan="5"></td></tr>`;
            
            Object.keys(estrutura[gK].subs).forEach(sK => {
                const ativosS = ativosG.filter(a => a.s === sK);
                if(ativosS.length === 0) return;
                const totalS = ativosS.reduce((a, b) => a + b.valor, 0);
                corpo.innerHTML += `<tr class="row-subgroup"><td>↳ ${sK}</td><td colspan="2"></td><td>R$ ${totalS.toLocaleString('pt-BR')}</td><td colspan="5"></td></tr>`;

                Object.keys(estrutura[gK].subs[sK].ests).forEach(eK => {
                    const ativosE = ativosS.filter(a => a.e === eK);
                    if(ativosE.length === 0) return;
                    const totalE = ativosE.reduce((a, b) => a + b.valor, 0);
                    corpo.innerHTML += `<tr class="row-strategy"><td>--- ${eK}</td><td colspan="2"></td><td>R$ ${totalE.toLocaleString('pt-BR')}</td><td colspan="5"></td></tr>`;

                    ativosE.forEach(item => {
                        const realIdx = dados.indexOf(item);
                        const pG = estrutura[gK].pesoG/100, pS = estrutura[gK].subs[sK].pesoS/100, pE = estrutura[gK].subs[sK].ests[eK]/100;
                        const alvoPerc = (pG * pS * pE) * 100;
                        const valorAlvo = totalGeral * (alvoPerc/100);
                        const ajuste = valorAlvo - item.valor;

                        corpo.innerHTML += `
                            <tr>
                                <td class="indent-3">${item.nome}</td>
                                <td>${item.corr}</td>
                                <td>${item.cnpj}</td>
                                <td>R$ ${item.valor.toLocaleString('pt-BR')}</td>
                                <td>${(item.valor/totalGeral*100).toFixed(2)}%</td>
                                <td>${alvoPerc.toFixed(2)}%</td>
                                <td>R$ ${valorAlvo.toLocaleString('pt-BR')}</td>
                                <td class="${ajuste > 0 ? 'pos' : 'neg'}">R$ ${ajuste.toLocaleString('pt-BR')}</td>
                                <td><button class="btn-del" onclick="remover(${realIdx})">X</button></td>
                            </tr>`;
                    });
                });
            });
        });
    }

    function remover(idx) { if(confirm("Remover?")) { dados.splice(idx, 1); render(); } }

    // --- FUNÇÕES DO SIMULADOR (MODAL) ---
    function abrirSimulador() {
        document.getElementById('modalSimulador').style.display = 'block';
        atualizarSaldosSimulador();
    }

    function fecharSimulador() { document.getElementById('modalSimulador').style.display = 'none'; }

    function atualizarSaldosSimulador() {
        const tipo = document.getElementById('simTipo').value;
        const container = document.getElementById('simInputsSaldos');
        container.innerHTML = '<h4>Saldos Atuais por Classe:</h4>';
        
        const classes = Object.keys(estrutura[tipo].subs);
        classes.forEach(nomeClasse => {
            // Soma todos os ativos que pertencem a este grupo e subgrupo
            const saldoAtual = dados
                .filter(a => a.g === tipo && a.s === nomeClasse)
                .reduce((sum, a) => sum + a.valor, 0);

            container.innerHTML += `
                <div class="form-group">
                    <label>${nomeClasse} (R$):</label>
                    <input type="number" class="sim-saldo-input" data-classe="${nomeClasse}" value="${saldoAtual.toFixed(2)}" oninput="calcularRebalanceamento()">
                </div>
            `;
        });
        calcularRebalanceamento();
    }

    function calcularRebalanceamento() {
        const tipo = document.getElementById('simTipo').value;
        const aporteDisp = parseFloat(document.getElementById('simValorAporte').value) || 0;
        const inputs = document.querySelectorAll('.sim-saldo-input');
        
        let saldoTotalAtual = 0;
        let saldosObjeto = {};

        inputs.forEach(input => {
            let val = parseFloat(input.value) || 0;
            saldosObjeto[input.dataset.classe] = val;
            saldoTotalAtual += val;
        });

        const patrimonioFinalAlvo = saldoTotalAtual + aporteDisp;
        const classesRef = estrutura[tipo].subs;
        const body = document.getElementById('simResultadoBody');
        body.innerHTML = '';

        // Cálculo de Necessidade
        let necessidades = {};
        let somaNecessidades = 0;

        Object.keys(classesRef).forEach(nome => {
            let alvoRelativo = classesRef[nome].pesoS / 100;
            let valorIdeal = patrimonioFinalAlvo * alvoRelativo;
            let necessidade = Math.max(0, valorIdeal - saldosObjeto[nome]);
            necessidades[nome] = necessidade;
            somaNecessidades += necessidade;
        });

        // Exibição
        Object.keys(classesRef).forEach(nome => {
            let aporteSugerido = 0;
            if (somaNecessidades > 0) {
                aporteSugerido = aporteDisp * (necessidades[nome] / somaNecessidades);
            } else {
                aporteSugerido = aporteDisp * (classesRef[nome].pesoS / 100);
            }

            body.innerHTML += `
                <tr>
                    <td>${nome}</td>
                    <td>${classesRef[nome].pesoS}%</td>
                    <td class="aporte-sugerido">R$ ${aporteSugerido.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                </tr>
            `;
        });
    }

    // Inicializar grupos no select de cadastro
    const selG = document.getElementById('selG');
    Object.keys(estrutura).forEach(g => selG.innerHTML += `<option value="${g}">${estrutura[g].nome}</option>`);
    render();
</script>

</body>
</html>
