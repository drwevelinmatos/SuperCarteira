<!DOCTYPE html>
<! Super Carteira Code 5.1>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Patrimônio Estratégica</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #27ae60; --bg: #f8f9fa; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1500px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 10px; }
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: var(--primary); color: white; padding: 15px; border-radius: 8px; text-align: center; }
        .card span { display: block; font-size: 0.8rem; opacity: 0.8; }
        .card strong { font-size: 1.2rem; }

        .form-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; background: #edf2f7; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        select, input, button { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 13px; }
        button { background: var(--accent); color: white; font-weight: bold; border: none; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 12px; }
        th { background: #2d3748; color: white; padding: 10px; text-align: left; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #edf2f7; }

        .row-group { background: #cbd5e0; font-weight: bold; font-size: 14px; }
        .row-subgroup { background: #edf2f7; font-weight: bold; }
        .row-strategy { background: #f7fafc; font-style: italic; color: #4a5568; }
        
        .indent-1 { padding-left: 15px; }
        .indent-2 { padding-left: 30px; }
        .indent-3 { padding-left: 45px; font-weight: 500; }
        
        .neg { color: #e53e3e; font-weight: bold; }
        .pos { color: #38a169; font-weight: bold; }
        .btn-del { background:#e53e3e; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Painel de Alocação de Ativos</h2>
        <div id="data-geral"></div>
    </header>

    <div class="summary-cards">
        <div class="card"><span>Patrimônio Total</span><strong id="total-investido">R$ 0,00</strong></div>
        <div class="card" style="background: #2d3748;"><span>Qtd. de Ativos</span><strong id="qtd-ativos">0</strong></div>
    </div>

    <div class="form-box">
        <select id="selGrupo" onchange="popularSubgrupos()">
            <option value="">Grupo...</option>
            <option value="RESERVA">Reserva de Emergência</option>
            <option value="SUPER_CARTEIRA">Super Carteira</option>
            <option value="PREVIDENCIA">Previdência</option>
            <option value="SATELITE">Satélite</option>
        </select>
        <select id="selSubgrupo" onchange="popularEstrategias()"><option value="">Subgrupo...</option></select>
        <select id="selEstrategia"><option value="">Estratégia...</option></select>
        <input type="text" id="nomeAtivo" placeholder="Ativo">
        <input type="text" id="corretora" placeholder="Corretora">
        <input type="text" id="cnpjAtivo" placeholder="CNPJ">
        <input type="number" id="valorAtual" placeholder="Valor (R$)">
        <button onclick="adicionarAtivo()">Salvar Ativo</button>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Estrutura / Ativo</th>
                    <th>Corretora</th>
                    <th>CNPJ</th>
                    <th>Valor Atual</th>
                    <th>% Real (G)</th>
                    <th>% Alvo (G)</th>
                    <th>Valor Alvo</th>
                    <th>Ajuste</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>
</div>

<script>
    const estrutura = {
        "RESERVA": { nome: "RESERVA DE EMERGÊNCIA", alvoG: 0, subs: { "Segurança": { alvoS: 100, ests: { "Fundo Taxa Zero": 50, "Reserva Alternativa": 50 } } } },
        "SUPER_CARTEIRA": { nome: "SUPER CARTEIRA", alvoG: 100, subs: {
            "Estabilidade": { alvoS: 22.5, ests: { "Baunilha": 70, "Pimentinha": 30 } },
            "Diversificação": { alvoS: 40, ests: { "Viés Macro": 30, "Ex-Tesoureiros": 40, "Viés Global": 20, "Agro": 3, "Infraestrutura": 5, "Pimentinha": 2 } },
            "Valorização": { alvoS: 30, ests: { "Qualidade": 40, "Fora do Radar": 15, "Perfil Global": 12, "Viés Comprado": 30, "Pimentinha": 3 } },
            "Antifragilidade": { alvoS: 7.5, ests: { "Ouro": 33.4, "Dólar": 66.6 } }
        }},
        "PREVIDENCIA": { nome: "PREVIDÊNCIA", alvoG: 100, subs: {
            "Estabilidade": { alvoS: 22.5, ests: { "Baunilha": 70, "Pimentinha": 30 } },
            "Diversificação": { alvoS: 40, ests: { "Viés Macro": 35, "Ex-Tesoureiros": 40, "Viés Global": 22, "Pimentinha": 3 } },
            "Valorização": { alvoS: 30, ests: { "Qualidade": 40, "Fora do Radar": 30, "Perfil Global": 12, "Viés Comprado": 30, "Pimentinha": 3 } },
            "Fundos de Fundos": { alvoS: 7.5, ests: { "Fundos de Fundos": 100 } }
        }},
        "SATELITE": { nome: "SATÉLITE", alvoG: 3, subs: { "Cripto": { alvoS: 100, ests: { "Cripto": 100 } } } }
    };

    let carteira = JSON.parse(localStorage.getItem('invest_med_v4')) || [];

    function popularSubgrupos() {
        const g = document.getElementById('selGrupo').value;
        const s = document.getElementById('selSubgrupo');
        s.innerHTML = '<option value="">Subgrupo...</option>';
        document.getElementById('selEstrategia').innerHTML = '<option value="">Estratégia...</option>';
        if(g) Object.keys(estrutura[g].subs).forEach(sub => s.innerHTML += `<option value="${sub}">${sub}</option>`);
    }

    function popularEstrategias() {
        const g = document.getElementById('selGrupo').value;
        const s = document.getElementById('selSubgrupo').value;
        const e = document.getElementById('selEstrategia');
        e.innerHTML = '<option value="">Estratégia...</option>';
        if(g && s) Object.keys(estrutura[g].subs[s].ests).forEach(est => e.innerHTML += `<option value="${est}">${est}</option>`);
    }

    function adicionarAtivo() {
        const item = {
            id: Date.now(),
            g: document.getElementById('selGrupo').value,
            s: document.getElementById('selSubgrupo').value,
            e: document.getElementById('selEstrategia').value,
            nome: document.getElementById('nomeAtivo').value,
            corretora: document.getElementById('corretora').value,
            cnpj: document.getElementById('cnpjAtivo').value,
            valor: parseFloat(document.getElementById('valorAtual').value) || 0
        };
        if(!item.e || !item.nome || item.valor <= 0) return alert("Dados inválidos!");
        carteira.push(item);
        render();
    }

    function render() {
        localStorage.setItem('invest_med_v4', JSON.stringify(carteira));
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';
        
        const totalGeral = carteira.reduce((a, b) => a + b.valor, 0);
        document.getElementById('total-investido').innerText = `R$ ${totalGeral.toLocaleString('pt-BR')}`;
        document.getElementById('qtd-ativos').innerText = carteira.length;

        Object.keys(estrutura).forEach(gK => {
            const ativosG = carteira.filter(a => a.g === gK);
            if(ativosG.length === 0) return;
            const totalG = ativosG.reduce((a, b) => a + b.valor, 0);
            
            corpo.innerHTML += `<tr class="row-group"><td>${estrutura[gK].nome}</td><td colspan="2"></td><td>R$ ${totalG.toLocaleString('pt-BR')}</td><td colspan="5"></td></tr>`;

            Object.keys(estrutura[gK].subs).forEach(sK => {
                const ativosS = ativosG.filter(a => a.s === sK);
                if(ativosS.length === 0) return;
                const totalS = ativosS.reduce((a, b) => a + b.valor, 0);

                corpo.innerHTML += `<tr class="row-subgroup"><td class="indent-1">↳ ${sK}</td><td colspan="8"></td></tr>`;

                Object.keys(estrutura[gK].subs[sK].ests).forEach(eK => {
                    const ativosE = ativosS.filter(a => a.e === eK);
                    if(ativosE.length === 0) return;

                    corpo.innerHTML += `<tr class="row-strategy"><td class="indent-2">-- ${eK}</td><td colspan="8"></td></tr>`;

                    ativosE.forEach(item => {
                        const alvoPercG = (estrutura[gK].subs[sK].alvoS * (estrutura[gK].subs[sK].ests[eK] / 100));
                        const valorAlvo = totalG * (alvoPercG / 100);
                        const ajuste = valorAlvo - item.valor;
                        const percRealG = (item.valor / totalG * 100);

                        corpo.innerHTML += `
                            <tr>
                                <td class="indent-3">${item.nome}</td>
                                <td>${item.corretora}</td>
                                <td>${item.cnpj}</td>
                                <td>R$ ${item.valor.toLocaleString('pt-BR')}</td>
                                <td>${percRealG.toFixed(1)}%</td>
                                <td>${alvoPercG.toFixed(1)}%</td>
                                <td>R$ ${valorAlvo.toLocaleString('pt-BR')}</td>
                                <td class="${ajuste > 0 ? 'pos' : 'neg'}">R$ ${ajuste.toLocaleString('pt-BR')}</td>
                                <td><button class="btn-del" onclick="remover(${item.id})">Remover</button></td>
                            </tr>
                        `;
                    });
                });
            });
        });
    }

    function remover(id) {
        carteira = carteira.filter(i => i.id !== id);
        render();
    }

    render();
    document.getElementById('data-geral').innerText = "Último acesso: " + new Date().toLocaleDateString();
</script>
</body>
</html>
