<!DOCTYPE html>
<!-- Super Carteira Code 4 -->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Patrimônio - Nível Especialista</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .form-box { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 10px; background: #e2e8f0; padding: 20px; border-radius: 10px; margin-bottom: 25px; 
        }
        select, input, button { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 13px; }
        button { background: var(--accent); color: white; font-weight: bold; border: none; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #2d3748; color: white; padding: 12px; text-align: left; font-size: 11px; }
        
        /* Cores de Hierarquia */
        .row-group { background: #cbd5e0; font-weight: bold; } /* Grupo */
        .row-subgroup { background: #edf2f7; font-weight: bold; padding-left: 20px; } /* Subgrupo */
        .row-strategy { background: #f7fafc; font-style: italic; color: #4a5568; } /* Sub-subgrupo */
        
        .indent-1 { padding-left: 20px; }
        .indent-2 { padding-left: 40px; }
        .indent-3 { padding-left: 60px; color: #2d3748; font-weight: 500; }
        
        .neg { color: #e53e3e; font-weight: bold; }
        .pos { color: #38a169; font-weight: bold; }
        .date { font-size: 10px; color: #a0aec0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Carteira de Investimentos - Hierarquia Completa</h2>

    <div class="form-box">
        <select id="selGrupo" onchange="popularSubgrupos()">
            <option value="">Grupo...</option>
            <option value="RESERVA">Reserva de Emergência</option>
            <option value="SUPER_CARTEIRA">Super Carteira</option>
            <option value="PREVIDENCIA">Previdência</option>
            <option value="SATELITE">Satélite</option>
        </select>
        <select id="selSubgrupo" onchange="popularEstrategias()">
            <option value="">Subgrupo...</option>
        </select>
        <select id="selEstrategia">
            <option value="">Estratégia...</option>
        </select>
        <input type="text" id="nomeAtivo" placeholder="Nome do Ativo">
        <input type="text" id="cnpjAtivo" placeholder="CNPJ">
        <input type="number" id="valorAtual" placeholder="Valor Atual (R$)">
        <button onclick="adicionarAtivo()">Adicionar</button>
    </div>

    <table id="tabelaMaster">
        <thead>
            <tr>
                <th>Estrutura (Grupo > Sub > Estratégia) / Ativo</th>
                <th>CNPJ</th>
                <th>Valor Atual</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
    const estrutura = {
        "RESERVA": {
            nome: "RESERVA DE EMERGÊNCIA",
            subgrupos: { "Segurança": { "Fundo Taxa Zero": 0, "Reserva Alternativa": 0 } }
        },
        "SUPER_CARTEIRA": {
            nome: "SUPER CARTEIRA",
            subgrupos: {
                "Estabilidade (22,5%)": { "Baunilha (70%)": 70, "Pimentinha (30%)": 30 },
                "Diversificação (40%)": { "Viés Macro (30%)": 30, "Ex-Tesoureiros (40%)": 40, "Viés Global (20%)": 20, "Agro (3%)": 3, "Infraestrutura (5%)": 5, "Pimentinha (2%)": 2 },
                "Valorização (30%)": { "Qualidade (40%)": 40, "Fora do Radar (15%)": 15, "Perfil Global (12%)": 12, "Viés Comprado (30%)": 30, "Pimentinha (3%)": 3 },
                "Antifragilidade (7,5%)": { "Ouro (33,4%)": 33.4, "Dólar (66,6%)": 66.6 }
            }
        },
        "PREVIDENCIA": {
            nome: "PREVIDÊNCIA",
            subgrupos: {
                "Estabilidade (22,5%)": { "Baunilha (70%)": 70, "Pimentinha (30%)": 30 },
                "Diversificação (40%)": { "Viés Macro (35%)": 35, "Ex-Tesoureiros (40%)": 40, "Viés Global (22%)": 22, "Pimentinha (3%)": 3 },
                "Valorização (30%)": { "Qualidade (40%)": 40, "Fora do Radar (30%)": 30, "Perfil Global (12%)": 12, "Viés Comprado (30%)": 30, "Pimentinha (3%)": 3 },
                "Fundos de Fundos (7,5%)": { "Fundos de Fundos (100%)": 100 }
            }
        },
        "SATELITE": {
            nome: "SATÉLITE (3%)",
            subgrupos: { "Cripto": { "Cripto (100%)": 100 } }
        }
    };

    let carteira = JSON.parse(localStorage.getItem('invest_v2')) || [];

    function popularSubgrupos() {
        const g = document.getElementById('selGrupo').value;
        const s = document.getElementById('selSubgrupo');
        s.innerHTML = '<option value="">Subgrupo...</option>';
        document.getElementById('selEstrategia').innerHTML = '<option value="">Estratégia...</option>';
        if(g) Object.keys(estrutura[g].subgrupos).forEach(sub => s.innerHTML += `<option value="${sub}">${sub}</option>`);
    }

    function popularEstrategias() {
        const g = document.getElementById('selGrupo').value;
        const s = document.getElementById('selSubgrupo').value;
        const e = document.getElementById('selEstrategia');
        e.innerHTML = '<option value="">Estratégia...</option>';
        if(g && s) Object.keys(estrutura[g].subgrupos[s]).forEach(est => e.innerHTML += `<option value="${est}">${est}</option>`);
    }

    function adicionarAtivo() {
        const item = {
            id: Date.now(),
            g: document.getElementById('selGrupo').value,
            s: document.getElementById('selSubgrupo').value,
            e: document.getElementById('selEstrategia').value,
            nome: document.getElementById('nomeAtivo').value,
            cnpj: document.getElementById('cnpjAtivo').value,
            valor: parseFloat(document.getElementById('valorAtual').value) || 0,
            data: new Date().toLocaleDateString()
        };
        if(!item.e || !item.nome) return alert("Preencha todos os campos!");
        carteira.push(item);
        render();
    }

    function render() {
        localStorage.setItem('invest_v2', JSON.stringify(carteira));
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';

        Object.keys(estrutura).forEach(gKey => {
            const ativosG = carteira.filter(a => a.g === gKey);
            if(ativosG.length === 0) return;

            corpo.innerHTML += `<tr class="row-group"><td>${estrutura[gKey].nome}</td><td colspan="3"></td></tr>`;

            Object.keys(estrutura[gKey].subgrupos).forEach(sKey => {
                const ativosS = ativosG.filter(a => a.s === sKey);
                if(ativosS.length === 0) return;

                corpo.innerHTML += `<tr class="row-subgroup"><td class="indent-1">↳ ${sKey}</td><td colspan="3"></td></tr>`;

                Object.keys(estrutura[gKey].subgrupos[sKey]).forEach(eKey => {
                    const ativosE = ativosS.filter(a => a.e === eKey);
                    if(ativosE.length === 0) return;

                    corpo.innerHTML += `<tr class="row-strategy"><td class="indent-2">-- ${eKey}</td><td colspan="3"></td></tr>`;

                    ativosE.forEach(ativo => {
                        corpo.innerHTML += `
                            <tr>
                                <td class="indent-3">${ativo.nome} <span class="date">(${ativo.data})</span></td>
                                <td>${ativo.cnpj}</td>
                                <td>R$ ${ativo.valor.toLocaleString('pt-BR')}</td>
                                <td><button onclick="remover(${ativo.id})" style="background:#e53e3e; padding: 3px 7px;">Remover</button></td>
                            </tr>
                        `;
                    });
                });
            });
        });
    }

    function remover(id) {
        carteira = carteira.filter(a => a.id !== id);
        render();
    }

    render();
</script>
</body>
</html>
