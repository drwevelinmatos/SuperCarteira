<!DOCTYPE html>
<! Super Carteira Code 6 >
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Patrimônio Unificada</title>
    <style>
        :root { --primary: #1a2a3a; --accent: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; font-size: 13px; }
        .container { max-width: 1600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .summary-cards { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { flex: 1; background: var(--primary); color: white; padding: 15px; border-radius: 8px; text-align: center; }
        
        .form-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; background: #edf2f7; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        select, input, button { padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; }
        button { cursor: pointer; font-weight: bold; border: none; }
        .btn-add { background: var(--accent); color: white; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #2d3748; color: white; padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #eee; }

        /* Estilo Hierarquia */
        .row-group { background: #1a2a3a; color: white; font-weight: bold; }
        .row-subgroup { background: #cbd5e0; font-weight: bold; }
        .row-strategy { background: #e2e8f0; font-style: italic; }
        .indent-3 { padding-left: 40px; }
        
        .pos { color: #27ae60; font-weight: bold; }
        .neg { color: #e53e3e; font-weight: bold; }
        .btn-edit { background: #3182ce; color: white; padding: 3px 8px; border-radius: 3px; margin-right: 5px; }
        .btn-del { background: #e53e3e; color: white; padding: 3px 8px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="summary-cards">
        <div class="card">Patrimônio Total: <strong id="total-geral">R$ 0,00</strong></div>
        <div class="card">Total Ativos Únicos: <strong id="qtd-ativos">0</strong></div>
    </div>

    <div class="form-box">
        <select id="selG" onchange="popularS()"><option value="">Grupo...</option></select>
        <select id="selS" onchange="popularE()"><option value="">Subgrupo...</option></select>
        <select id="selE"><option value="">Estratégia...</option></select>
        <input type="text" id="nome" placeholder="Ativo">
        <input type="text" id="corr" placeholder="Corretora">
        <input type="text" id="cnpj" placeholder="CNPJ">
        <input type="number" id="valor" placeholder="Valor (R$)">
        <button class="btn-add" onclick="adicionarAtivo()">Salvar Ativo</button>
    </div>

    <table id="tabela">
        <thead>
            <tr>
                <th>Estrutura / Ativo</th>
                <th>Corretora</th>
                <th>CNPJ</th>
                <th>Valor Atual</th>
                <th>% Real (Total)</th>
                <th>% Alvo (Total)</th>
                <th>Valor Alvo</th>
                <th>Ajuste</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpo"></tbody>
    </table>
</div>

<script>
    const estrutura = {
        "RESERVA": { nome: "RESERVA DE EMERGÊNCIA", pesoG: 0, subs: { "Segurança": { pesoS: 100, ests: { "Fundo Taxa Zero": 50, "Reserva Alternativa": 50 } } } },
        "SUPER_CARTEIRA": { nome: "SUPER CARTEIRA", pesoG: 57, subs: { 
            "Estabilidade": { pesoS: 22.5, ests: { "Baunilha": 70, "Pimentinha": 30 } },
            "Diversificação": { pesoS: 40, ests: { "Viés Macro": 30, "Ex-Tesoureiros": 40, "Viés Global": 20, "Agro": 3, "Infraestrutura": 5, "Pimentinha": 2 } },
            "Valorização": { pesoS: 30, ests: { "Qualidade": 40, "Fora do Radar": 15, "Perfil Global": 12, "Viés Comprado": 30, "Pimentinha": 3 } },
            "Antifragilidade": { pesoS: 7.5, ests: { "Ouro": 33.4, "Dólar": 66.6 } }
        }},
        "PREVIDENCIA": { nome: "PREVIDÊNCIA", pesoG: 40, subs: {
            "Estabilidade": { pesoS: 22.5, ests: { "Baunilha": 70, "Pimentinha": 30 } },
            "Diversificação": { pesoS: 40, ests: { "Viés Macro": 35, "Ex-Tesoureiros": 40, "Viés Global": 22, "Pimentinha": 3 } },
            "Valorização": { pesoS: 30, ests: { "Qualidade": 40, "Fora do Radar": 30, "Perfil Global": 12, "Viés Comprado": 30, "Pimentinha": 3 } },
            "Fundos de Fundos": { pesoS: 7.5, ests: { "Fundos de Fundos": 100 } }
        }},
        "SATELITE": { nome: "SATÉLITE", pesoG: 3, subs: { "Cripto": { pesoS: 100, ests: { "Cripto": 100 } } } }
    };

    let dados = JSON.parse(localStorage.getItem('invest_v5')) || [];

    function popularS() {
        const g = document.getElementById('selG').value;
        const s = document.getElementById('selS');
        s.innerHTML = '<option value="">Subgrupo...</option>';
        if(g) Object.keys(estrutura[g].subs).forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`);
    }

    function popularE() {
        const g = document.getElementById('selG').value;
        const s = document.getElementById('selS').value;
        const e = document.getElementById('selE');
        e.innerHTML = '<option value="">Estratégia...</option>';
        if(g && s) Object.keys(estrutura[g].subs[s].ests).forEach(k => e.innerHTML += `<option value="${k}">${k}</option>`);
    }

    function adicionarAtivo() {
        const novo = {
            g: document.getElementById('selG').value,
            s: document.getElementById('selS').value,
            e: document.getElementById('selE').value,
            nome: document.getElementById('nome').value.trim(),
            corr: document.getElementById('corr').value,
            cnpj: document.getElementById('cnpj').value.trim(),
            valor: parseFloat(document.getElementById('valor').value) || 0
        };

        if(!novo.nome || novo.valor <= 0) return alert("Dados inválidos");

        // Regra de Unificação: Busca por Nome ou CNPJ no mesmo sub-subgrupo
        const index = dados.findIndex(item => (item.nome === novo.nome || (item.cnpj !== "" && item.cnpj === novo.cnpj)) && item.e === novo.e);
        
        if(index > -1) {
            dados[index].valor += novo.valor;
        } else {
            dados.push(novo);
        }
        render();
    }

    function editarAtivo(idx) {
        const novoValor = prompt("Informe o novo valor total para este ativo:", dados[idx].valor);
        if(novoValor !== null) {
            dados[idx].valor = parseFloat(novoValor) || 0;
            render();
        }
    }

    function remover(idx) { if(confirm("Remover?")) { dados.splice(idx, 1); render(); } }

    function render() {
        localStorage.setItem('invest_v5', JSON.stringify(dados));
        const corpo = document.getElementById('corpo');
        corpo.innerHTML = '';
        const totalGeral = dados.reduce((a, b) => a + b.valor, 0);
        document.getElementById('total-geral').innerText = `R$ ${totalGeral.toLocaleString('pt-BR')}`;
        document.getElementById('qtd-ativos').innerText = dados.length;

        Object.keys(estrutura).forEach(gK => {
            const ativosG = dados.filter(a => a.g === gK);
            if(ativosG.length === 0) return;
            const totalG = ativosG.reduce((a, b) => a + b.valor, 0);
            
            corpo.innerHTML += `<tr class="row-group"><td>${estrutura[gK].nome}</td><td colspan="2"></td><td>R$ ${totalG.toLocaleString('pt-BR')}</td><td colspan="5"></td></tr>`;

            Object.keys(estrutura[gK].subs).forEach(sK => {
                const ativosS = ativosG.filter(a => a.s === sK);
                if(ativosS.length === 0) return;
                const totalS = ativosS.reduce((a, b) => a + b.valor, 0);

                corpo.innerHTML += `<tr class="row-subgroup"><td>↳ ${sK}</td><td colspan="2"></td><td>R$ ${totalS.toLocaleString('pt-BR')}</td><td colspan="5"></td></tr>`;

                Object.keys(estrutura[gK].subs[sK].ests).forEach(eK => {
                    const ativosE = ativosS.filter(a => a.e === eKey = eK);
                    if(ativosE.length === 0) return;
                    const totalE = ativosE.reduce((a, b) => a + b.valor, 0);

                    corpo.innerHTML += `<tr class="row-strategy"><td>--- ${eK}</td><td colspan="2"></td><td>R$ ${totalE.toLocaleString('pt-BR')}</td><td colspan="5"></td></tr>`;

                    ativosE.forEach((item, idxOrigem) => {
                        // idx no array original
                        const realIdx = dados.indexOf(item);
                        
                        // % Alvo Total = % do Grupo no Total * % do Subgrupo no Grupo * % da Estratégia no Subgrupo
                        const pesoG = estrutura[gK].pesoG / 100;
                        const pesoS = estrutura[gK].subs[sK].pesoS / 100;
                        const pesoE = estrutura[gK].subs[sK].ests[eK] / 100;
                        
                        const alvoPercTotal = (pesoG * pesoS * pesoE) * 100;
                        const valorAlvo = totalGeral * (alvoPercTotal / 100);
                        const ajuste = valorAlvo - item.valor;
                        const percRealTotal = totalGeral > 0 ? (item.valor / totalGeral * 100) : 0;

                        corpo.innerHTML += `
                            <tr>
                                <td class="indent-3">${item.nome}</td>
                                <td>${item.corr}</td>
                                <td>${item.cnpj}</td>
                                <td>R$ ${item.valor.toLocaleString('pt-BR')}</td>
                                <td>${percRealTotal.toFixed(2)}%</td>
                                <td>${alvoPercTotal.toFixed(2)}%</td>
                                <td>R$ ${valorAlvo.toLocaleString('pt-BR')}</td>
                                <td class="${ajuste > 0 ? 'pos' : 'neg'}">R$ ${ajuste.toLocaleString('pt-BR')}</td>
                                <td>
                                    <button class="btn-edit" onclick="editarAtivo(${realIdx})">Editar</button>
                                    <button class="btn-del" onclick="remover(${realIdx})">Remover</button>
                                </td>
                            </tr>
                        `;
                    });
                });
            });
        });
    }

    // Inicialização
    const selG = document.getElementById('selG');
    Object.keys(estrutura).forEach(g => selG.innerHTML += `<option value="${g}">${estrutura[g].nome}</option>`);
    render();
</script>
</body>
</html>
