<!DOCTYPE html>
<Investimentos Code 2>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Investimentos - Médico</title>
    <style>
        :root {
            --primary: #003366; /* Azul formal */
            --accent: #27ae60;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary); border-left: 5px solid var(--accent); padding-left: 15px; }

        .form-section { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            background: #f1f2f6; 
            padding: 20px; 
            border-radius: 10px;
            margin-bottom: 30px;
        }

        select, input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        button { 
            background: var(--primary); color: white; border: none; 
            padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #004a94; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }

        .group-header { background: #e8f4fd; font-weight: bold; color: var(--primary); }
        .negative { color: #d63031; font-weight: bold; }
        .positive { color: #27ae60; font-weight: bold; }
        .update-tag { font-size: 10px; color: #999; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gestão de Ativos Financeiros</h2>

    <!-- Cadastro de Ativos -->
    <div class="form-section">
        <select id="selGrupo" onchange="atualizarSubgrupos()">
            <option value="">Selecione o Grupo</option>
            <option value="RESERVA DE EMERGÊNCIA">Reserva de Emergência</option>
            <option value="SUPER CARTEIRA">Super Carteira (Ativos Diretos)</option>
            <option value="PREVIDÊNCIA">Previdência (10 Anos)</option>
            <option value="OUTROS">Outros / Satélite</option>
        </select>

        <select id="selSubgrupo">
            <option value="">Aguardando Grupo...</option>
        </select>

        <input type="text" id="nomeAtivo" placeholder="Nome do Fundo/Ativo">
        <input type="text" id="cnpjAtivo" placeholder="CNPJ (se houver)">
        <input type="number" id="valorAtual" placeholder="Valor Atual (R$)">
        <input type="number" id="percentAlvo" placeholder="% Alvo do Ativo">
        <button onclick="adicionarAoPortfolio()">Salvar Ativo</button>
    </div>

    <table id="tabelaInvestimentos">
        <thead>
            <tr>
                <th>GRUPO / ATIVO</th>
                <th>CNPJ / CORRETORA</th>
                <th>VALOR ATUAL</th>
                <th>% REAL</th>
                <th>% ALVO</th>
                <th>VALOR ALVO</th>
                <th>AJUSTE (R$)</th>
                <th>AÇÕES</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
    const subgruposPorGrupo = {
        "RESERVA DE EMERGÊNCIA": ["Segurança", "Fundo Taxa Zero", "Reserva Alternativa"],
        "SUPER CARTEIRA": ["Estabilidade - 6 Meses", "Baunilha", "Diversificação - 3 Anos", "Viés Macro", "Agro", "Infraestrutura", "Pimentinha", "Antifragilidade"],
        "PREVIDÊNCIA": ["Estabilidade", "Baunilha", "Diversificação", "Valorização", "Fundo de Fundos"],
        "OUTROS": ["Cripto", "Crédito Privado", "Imóveis"]
    };

    let carteira = JSON.parse(localStorage.getItem('minhaCarteira')) || [];

    function atualizarSubgrupos() {
        const grupo = document.getElementById('selGrupo').value;
        const comboSub = document.getElementById('selSubgrupo');
        comboSub.innerHTML = '<option value="">Selecione o Subgrupo</option>';
        
        if (grupo && subgruposPorGrupo[grupo]) {
            subgruposPorGrupo[grupo].forEach(sub => {
                let opt = document.createElement('option');
                opt.value = sub;
                opt.innerHTML = sub;
                comboSub.appendChild(opt);
            });
        }
    }

    function adicionarAoPortfolio() {
        const novoItem = {
            id: Date.now(),
            grupo: document.getElementById('selGrupo').value,
            subgrupo: document.getElementById('selSubgrupo').value,
            nome: document.getElementById('nomeAtivo').value,
            cnpj: document.getElementById('cnpjAtivo').value,
            valor: parseFloat(document.getElementById('valorAtual').value) || 0,
            alvo: parseFloat(document.getElementById('percentAlvo').value) || 0,
            data: new Date().toLocaleString('pt-BR')
        };

        if(!novoItem.grupo || !novoItem.nome) return alert("Preencha o Grupo e o Nome!");

        carteira.push(novoItem);
        salvarERenderizar();
    }

    function salvarERenderizar() {
        localStorage.setItem('minhaCarteira', JSON.stringify(carteira));
        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = '';

        const totalGeral = carteira.reduce((acc, item) => acc + item.valor, 0);

        // Agrupar para exibição
        const gruposUnicos = [...new Set(carteira.map(i => i.grupo))];

        gruposUnicos.forEach(g => {
            const itensDoGrupo = carteira.filter(i => i.grupo === g);
            const totalDoGrupo = itensDoGrupo.reduce((acc, i) => acc + i.valor, 0);

            // Linha de Cabeçalho do Grupo
            corpo.innerHTML += `<tr class="group-header"><td colspan="2">${g}</td><td>R$ ${totalDoGrupo.toLocaleString('pt-BR')}</td><td colspan="5"></td></tr>`;

            itensDoGrupo.forEach(item => {
                const percReal = totalGeral > 0 ? (item.valor / totalGeral) * 100 : 0;
                const valorAlvo = totalGeral * (item.alvo / 100);
                const ajuste = valorAlvo - item.valor;

                corpo.innerHTML += `
                    <tr>
                        <td>${item.subgrupo} - <strong>${item.nome}</strong> <span class="update-tag">Última atualização: ${item.data}</span></td>
                        <td>${item.cnpj}</td>
                        <td>R$ ${item.valor.toLocaleString('pt-BR')}</td>
                        <td>${percReal.toFixed(2)}%</td>
                        <td>${item.alvo}%</td>
                        <td>R$ ${valorAlvo.toLocaleString('pt-BR')}</td>
                        <td class="${ajuste > 0 ? 'positive' : 'negative'}">R$ ${ajuste.toLocaleString('pt-BR')}</td>
                        <td><button onclick="remover(${item.id})" style="background:#cc0000; padding: 5px 10px;">X</button></td>
                    </tr>
                `;
            });
        });
    }

    function remover(id) {
        carteira = carteira.filter(i => i.id !== id);
        salvarERenderizar();
    }

    // Inicializar
    salvarERenderizar();
</script>

</body>
</html>
